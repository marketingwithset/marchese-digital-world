*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#050505;font-family:'Outfit',sans-serif}

#crosshair.show{opacity:.4}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#C5A55A}
#crosshair::before{width:1.5px;height:18px;left:8.25px}
#crosshair::after{width:18px;height:1.5px;top:8.25px}
#hud{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none}
#prompt{background:rgba(10,22,40,.88);border:1px solid rgba(197,165,90,.3);color:#F5F0E8;padding:.6rem 1.4rem;border-radius:8px;font-size:.8rem;letter-spacing:.05em;backdrop-filter:blur(12px);opacity:0;transition:opacity .3s;white-space:nowrap}

#ipanel.vis{opacity:1;visibility:visible}
#ipanel h3{font-family:'Playfair Display',serif;font-size:1.3rem;color:#C5A55A;margin-bottom:.6rem}
#ipanel p{font-size:.85rem;line-height:1.65;color:rgba(245,240,232,.75);margin-bottom:1rem}
.cbtn{position:absolute;top:.8rem;right:1rem;background:none;border:none;color:rgba(245,240,232,.4);font-size:1.4rem;cursor:pointer}
.cta{display:inline-block;background:linear-gradient(135deg,#C5A55A,#FFD700);color:#0A1628;padding:.65rem 1.4rem;border-radius:6px;font-weight:600;font-size:.8rem;cursor:pointer;border:none}
#hint{position:fixed;bottom:1rem;right:1.5rem;z-index:90;color:rgba(245,240,232,.2);font-size:.6rem;letter-spacing:.1em;pointer-events:none}
</style>
</head>

if(d.type==='portal'){const f=document.createElement('div');f.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:white;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none';document.body.appendChild(f);requestAnimationFrame(()=>{f.style.opacity='0.8';setTimeout(()=>{f.style.opacity='0';const l=document.getElementById('rlabel');l.textContent=d.name.toUpperCase();l.classList.add('vis');setTimeout(()=>l.classList.remove('vis'),3000);setTimeout(()=>f.remove(),500);},400);});return;}
it.textContent=d.name;ib.textContent=d.description||'';
if(d.type==='phonebooth'){ic.textContent='Open Contact Form';ic.style.display='inline-block';}
else if(d.type==='painting'){ic.textContent='Inquire About This Piece';ic.style.display='inline-block';}
else ic.style.display='none';
ip.classList.add('vis');}
addEventListener('click',act);addEventListener('keydown',e=>{if(e.key.toLowerCase()==='e')act();if(e.key==='Escape')ip.classList.remove('vis');});
let lp=0;const lb=document.getElementById('loading-bar'),lpc=document.getElementById('loading-percent'),ls2=document.getElementById('loading-screen'),so=document.getElementById('start-overlay');
const iv=setInterval(()=>{lp+=Math.random()*15+5;if(lp>=100){lp=100;clearInterval(iv);setTimeout(()=>{ls2.classList.add('hidden');so.classList.add('show');},500);}lb.style.width=lp+'%';lpc.textContent=Math.floor(lp);},140);
so.addEventListener('click',()=>{so.classList.remove('show');so.style.display='none';oc.enabled=true;document.getElementById('crosshair').classList.add('show');const l=document.getElementById('rlabel');l.textContent='MAIN HALL';l.classList.add('vis');setTimeout(()=>l.classList.remove('vis'),3000);st.on=true;});
addEventListener('keydown',e=>{st.k[e.key.toLowerCase()]=true;});addEventListener('keyup',e=>{st.k[e.key.toLowerCase()]=false;});
function upd(dt){if(!st.on||!st.ch)return;const spd=P.SPD*(st.k.shift?P.SPR:1)*dt;const dir=new T.Vector3();
const fw2=new T.Vector3();cam.getWorldDirection(fw2);fw2.y=0;fw2.normalize();
const rt=new T.Vector3();rt.crossVectors(fw2,new T.Vector3(0,1,0)).normalize();
if(st.k.w||st.k.arrowup)dir.add(fw2);if(st.k.s||st.k.arrowdown)dir.sub(fw2);
if(st.k.d||st.k.arrowright)dir.add(rt);if(st.k.a||st.k.arrowleft)dir.sub(rt);
if(dir.length()>0){dir.normalize();const np=st.ch.position.clone().add(dir.multiplyScalar(spd));
const hw=H.W/2-P.R-0.5,hd2=H.D/2-P.R-0.5;np.x=Math.max(-hw,Math.min(hw,np.x));np.z=Math.max(-hd2,Math.min(hd2,np.z));
st.ch.position.copy(np);const a=Math.atan2(dir.x,dir.z);st.ch.rotation.y=T.MathUtils.lerp(st.ch.rotation.y,a,0.15);
st.ch.position.y=Math.sin(st.clk.getElapsedTime()*8)*0.03;}else{st.ch.position.y=Math.sin(st.clk.getElapsedTime()*1.5)*0.01;}
oc.target.lerp(new T.Vector3(st.ch.position.x,st.ch.position.y+1.2,st.ch.position.z),0.1);}
function loop(){requestAnimationFrame(loop);const dt=Math.min(st.clk.getDelta(),0.05);upd(dt);oc.update();chkI();
sc.traverse(c=>{if(c.userData&&c.userData.animate)c.userData.animate(st.clk.getElapsedTime());});rn.render(sc,cam);}
addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();rn.setSize(innerWidth,innerHeight);});
loop();
</script>
</body>
